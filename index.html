<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo-Buchhaltung - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full space-y-8 bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-2xl">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-emerald-500 tracking-tight">Campo-Buchhaltung</h2>
            <p class="mt-2 text-sm text-gray-400 font-medium">Anmelden um fortzufahren</p>
        </div>

        <div id="auth-section" class="space-y-4">
            <input id="authEmail" type="email" placeholder="E-Mail" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
            <input id="authPassword" type="password" placeholder="Passwort" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm text-white focus:outline-none focus:border-emerald-500">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="handleLogin()" class="bg-blue-600 hover:bg-blue-500 text-white py-2 rounded text-sm font-semibold transition">Login</button>
                <button onclick="handleSignUp()" class="bg-gray-700 hover:bg-gray-600 text-white py-2 rounded text-sm font-semibold transition">Registrieren</button>
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-700"></div>
                <span class="flex-shrink mx-3 text-gray-500 text-xs uppercase font-semibold">oder</span>
                <div class="flex-grow border-t border-gray-700"></div>
            </div>

            <button onclick="handleGoogleLogin()" class="w-full bg-white hover:bg-gray-100 text-gray-900 py-2 rounded text-sm font-bold transition flex items-center justify-center gap-2 shadow">
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
                Mit Google anmelden
            </button>
        </div>
    </div>

    <script>
        const SB_URL = "https://ebhyuxpumgtxneolksur.supabase.co";
        const SB_KEY = "sb_publishable_uKfOIinQ9EdNd8wlJlXigw_tesN18hx";
        let supabaseClient = null;

        window.onload = async () => {
            supabaseClient = supabase.createClient(SB_URL, SB_KEY);
            
            // Falls bereits eingeloggt, Status prüfen
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                await checkApprovalAndRedirect(session);
            }

            // Auth State überwachen (wichtig für Google Login Redirect)
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    await checkApprovalAndRedirect(session);
                }
            });
        };

        async function checkApprovalAndRedirect(session) {
            const { data: roleData, error } = await supabaseClient
                .from('user_roles')
                .select('is_approved')
                .eq('id', session.user.id)
                .single();

            if (error || !roleData || !roleData.is_approved) {
                alert("Dein Account wurde noch nicht vom Administrator freigeschaltet. Bitte hab ein wenig Geduld.");
                await supabaseClient.auth.signOut();
                return;
            }
            window.location.href = 'dashboard.html';
        }

        async function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if (!email || !password) { alert("Bitte E-Mail und Passwort eingeben."); return; }
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Login fehlgeschlagen: " + error.message);
            } else if (data.session) {
                await checkApprovalAndRedirect(data.session);
            }
        }

        async function handleSignUp() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if (!email || !password) { alert("Bitte E-Mail und Passwort eingeben."); return; }
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert("Registrierung fehlgeschlagen: " + error.message);
            else if (data.session === null) alert('Registrierung erfolgreich! Bitte prüfen Sie Ihre E-Mails zur Aktivierung.');
        }

        async function handleGoogleLogin() {
            if (window.location.protocol === 'file:') {
                alert('Google Login funktioniert nur über einen Webserver.');
                return;
            }
            
            // Ermittelt die aktuelle URL ohne Query-Parameter für den Redirect
            const redirectUrl = window.location.origin + window.location.pathname;
            console.log("Redirecting to:", redirectUrl);

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    redirectTo: redirectUrl 
                }
            });
            if (error) alert("Google Login Fehler: " + error.message);
        }
    </script>
</body>
</html>
